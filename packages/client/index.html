<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mark My Hordes</title>
  <!-- Fonts loaded inline to avoid cross-origin issues in itch.io iframe -->
  <style>
    /* System font fallbacks for Fredoka and Nunito */
    @font-face { font-family: 'Fredoka'; font-style: normal; font-weight: 400 700; src: local('Fredoka'), local('Nunito'); }
    @font-face { font-family: 'Nunito'; font-style: normal; font-weight: 400 800; src: local('Nunito'), local('Segoe UI'); }
  </style>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0f1a0a;
      color: #d4c8a0;
      font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #hud-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* ─── HERO SELECT BAR (bottom) ──────────────────────── */
    #hero-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 8px 16px;
      background: rgba(27, 16, 64, 0.96);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 3px solid #FF6B9D;
      display: none;
      pointer-events: all;
      z-index: 20;
    }
    #hero-bar .hero-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
      justify-content: center;
    }
    .hero-slot {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.04);
      border: 3px solid #3D2070;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 180px;
      position: relative;
    }
    .hero-slot:hover { border-color: #6CC4FF; background: rgba(108,196,255,0.08); }
    .hero-slot.active {
      border-color: #FFD93D;
      background: rgba(255,217,61,0.12);
      box-shadow: 0 0 12px rgba(255,217,61,0.3), inset 0 0 12px rgba(255,217,61,0.08);
    }
    .hero-slot.dead {
      opacity: 0.45;
      pointer-events: none;
      background: rgba(255, 80, 80, 0.08);
      border-color: rgba(255, 80, 80, 0.3);
    }
    .hero-slot.dead .hero-name {
      text-decoration: line-through;
      color: #FF6B6B;
    }
    .hero-slot .hotkey {
      position: absolute;
      top: -8px;
      left: -8px;
      width: 22px;
      height: 22px;
      background: linear-gradient(135deg, #FF6B9D, #C98FFF);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka', sans-serif;
    }
    .hero-slot .hero-icon { font-size: 24px; line-height: 1; }
    .hero-slot .hero-info { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; }
    .hero-slot .hero-name {
      font-size: 12px;
      font-weight: 700;
      color: #f0e8ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
    }
    .hero-slot .hero-class { font-size: 10px; color: #8B6DB0; }
    .hero-slot .hero-companion { font-size: 10px; color: #C98FFF; }
    .hero-slot .hero-hp-bar {
      width: 100%;
      height: 5px;
      background: #2A1858;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 2px;
    }
    .hero-slot .hero-hp-fill {
      height: 100%;
      background: #45E6B0;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .hero-slot .hero-hp-fill.low { background: #FF6B6B; }
    .hero-slot .hero-hp-fill.mid { background: #FFD93D; }

    /* Ability bar (shows for selected hero) */
    .ability-bar {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 6px;
    }
    .ability-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: rgba(201, 143, 255, 0.12);
      border: 2px solid #4A2580;
      border-radius: 10px;
      cursor: pointer;
      pointer-events: all;
      transition: all 0.2s ease;
      min-width: 120px;
    }
    .ability-btn:hover { border-color: #C98FFF; background: rgba(201, 143, 255, 0.2); }
    .ability-btn:not(.on-cooldown) {
      animation: ability-pulse 2.5s ease-in-out infinite;
    }
    .ability-btn.on-cooldown { opacity: 0.5; cursor: default; }
    .ability-btn .ability-key {
      background: rgba(201, 143, 255, 0.5);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 5px;
      border-radius: 4px;
      font-family: 'Fredoka', sans-serif;
    }
    .ability-btn .ability-name { font-size: 11px; color: #C98FFF; font-weight: 700; }
    .ability-btn .ability-cd { font-size: 11px; font-weight: 800; margin-left: auto; }
    .ability-btn .ability-cd.ready { color: #45E6B0; }
    .ability-btn .ability-cd.cooldown { color: #FF9F43; }

    /* Voice indicator */
    .voice-section {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.04);
      border: 3px solid #3D2070;
      border-radius: 12px;
      margin-left: auto;
      transition: all 0.2s;
    }
    .voice-section.listening {
      border-color: #FF6B6B;
      background: rgba(255,70,70,0.2);
      box-shadow: 0 0 16px rgba(255,107,107,0.3);
      animation: voice-pulse 0.8s infinite;
    }
    .voice-section .voice-label {
      font-size: 11px;
      color: #8B6DB0;
      font-weight: 600;
      transition: color 0.2s;
    }
    .voice-section.listening .voice-label {
      color: #FF6B6B;
    }
    @keyframes voice-pulse {
      0%, 100% { box-shadow: 0 0 8px rgba(255,107,107,0.2); }
      50% { box-shadow: 0 0 20px rgba(255,107,107,0.5); }
    }
    .voice-transcript {
      font-size: 12px;
      color: #FFD93D;
      font-weight: 600;
      max-width: 250px;
      white-space: normal;
      word-wrap: break-word;
      line-height: 1.3;
    }

    /* ─── COMMAND LOG ──────────────────────────────────── */
    #command-log {
      position: absolute;
      bottom: 120px;
      left: 16px;
      width: 350px;
      max-height: 180px;
      overflow-y: auto;
      background: rgba(27, 16, 64, 0.88);
      border: 2px solid #3D2070;
      border-radius: 14px;
      padding: 8px 12px;
      font-size: 12px;
      pointer-events: all;
      display: none;
      z-index: 20;
      scrollbar-gutter: stable;
      mask-image: linear-gradient(to bottom, transparent 0%, #000 15%, #000 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 15%, #000 100%);
    }
    #command-log .log-entry {
      margin-bottom: 4px;
      padding: 5px 8px;
      border-bottom: 1px solid #2A1858;
      border-left: 2px solid rgba(201, 143, 255, 0.3);
      transition: background 0.2s ease;
    }
    #command-log .log-entry .player { color: #6CC4FF; font-weight: 700; }
    #command-log .log-entry .text { color: #cbb8ee; }
    #command-log .log-entry .result { color: #5DFFC4; font-size: 11px; font-weight: 600; }

    /* ─── STATUS BAR ──────────────────────────────────── */
    #status-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 8px 12px;
      background: rgba(27, 16, 64, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 2px solid #3D2070;
      display: none;
      pointer-events: all;
      z-index: 20;
      font-size: 13px;
    }
    #status-bar .team-section {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    #status-bar .char-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 2px solid #3D2070;
      min-width: 170px;
      transition: all 0.2s ease;
    }
    #status-bar .char-card.dead { opacity: 0.4; }
    #status-bar .char-card.ally { border-left: 3px solid #6CC4FF; }
    #status-bar .char-card.enemy { border-left: 3px solid #FF6B6B; }
    #status-bar .char-info { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; }
    #status-bar .char-name { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #status-bar .char-class { font-size: 10px; color: #8B6DB0; }
    #status-bar .char-hp-row { display: flex; align-items: center; gap: 6px; }
    #status-bar .hp-bar {
      flex: 1;
      height: 6px;
      background: #2A1858;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid #3D2070;
    }
    #status-bar .hp-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }
    #status-bar .hp-fill.ally { background: #45E6B0; }
    #status-bar .hp-fill.enemy { background: #FF6B6B; }
    #status-bar .hp-text { font-size: 10px; color: #cbb8ee; min-width: 50px; text-align: right; }
    #status-bar .char-ability-row { display: flex; align-items: center; gap: 6px; margin-top: 1px; }
    #status-bar .ability-name { font-size: 10px; color: #C98FFF; font-weight: 600; white-space: nowrap; }
    #status-bar .ability-cd { font-size: 10px; font-weight: 700; }
    #status-bar .ability-cd.ready { color: #45E6B0; }
    #status-bar .ability-cd.on-cd { color: #FF9F43; }
    #status-bar .char-effects { display: flex; gap: 4px; margin-top: 1px; }
    #status-bar .effect-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 0 4px;
      border-radius: 3px;
      background: rgba(0,0,0,0.3);
    }
    #status-bar .char-order { font-size: 10px; color: #FFD93D; font-weight: 600; }
    #status-bar .char-flag { color: #FFD93D; font-size: 10px; font-weight: 700; }
    #status-bar .char-xp-row { display: flex; align-items: center; gap: 4px; margin: 1px 0; }
    #status-bar .xp-bar {
      flex: 1; height: 3px; background: rgba(0,0,0,0.4); border-radius: 2px; overflow: hidden;
    }
    #status-bar .xp-fill {
      height: 100%; background: linear-gradient(90deg, #FFD93D, #FF9F43); border-radius: 2px;
      transition: width 0.3s ease;
    }
    #status-bar .xp-text { font-size: 8px; color: #FFD93D; white-space: nowrap; }
    #status-bar .char-inventory {
      display: flex; gap: 3px; flex-wrap: wrap; margin: 1px 0;
    }
    #status-bar .inv-item {
      font-size: 9px; color: #FF9F43; background: rgba(255,159,67,0.15);
      padding: 1px 4px; border-radius: 3px; border: 1px solid rgba(255,159,67,0.3);
      cursor: help;
    }
    #status-bar .char-channel { margin: 2px 0; }
    #status-bar .channel-bar {
      height: 4px; background: rgba(0,0,0,0.4); border-radius: 2px; overflow: hidden;
    }
    #status-bar .channel-fill {
      height: 100%; background: linear-gradient(90deg, #6CC4FF, #45E6B0); border-radius: 2px;
      transition: width 0.3s ease;
    }
    .processing-indicator {
      color: #FFD93D;
      font-style: italic;
      font-weight: 600;
      padding: 4px 0;
    }

    /* ─── ABILITY PANEL (right sidebar) ────────────────── */
    #ability-panel {
      position: absolute;
      top: 80px;
      right: 8px;
      width: 225px;
      background: rgba(27, 16, 64, 0.94);
      border: 3px solid #3D2070;
      border-radius: 16px;
      padding: 12px;
      pointer-events: all;
      display: none;
      z-index: 20;
      font-family: 'Nunito', sans-serif;
      max-height: calc(100vh - 180px);
      overflow-y: auto;
      scrollbar-gutter: stable;
    }
    #ability-panel h3 {
      font-size: 12px;
      color: #FF6B9D;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0 0 8px 0;
      border-bottom: 2px solid #3D2070;
      padding-bottom: 6px;
      font-family: 'Fredoka', sans-serif;
    }
    .ap-char {
      margin-bottom: 10px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      border-left: 4px solid #FF6B9D;
    }
    .ap-char.enemy { border-left-color: #FF6B6B; }
    .ap-char-name { font-size: 13px; font-weight: 700; color: #f0e8ff; }
    .ap-char-class { font-size: 11px; color: #8B6DB0; }
    .ap-ability {
      margin-top: 4px;
      padding: 4px 8px;
      background: rgba(255, 107, 157, 0.1);
      border-radius: 8px;
      font-size: 11px;
    }
    .ap-ability.selected {
      background: rgba(201, 143, 255, 0.2);
      border: 1px solid rgba(201, 143, 255, 0.4);
    }
    .ap-hotkey {
      display: inline-block;
      background: rgba(201, 143, 255, 0.4);
      color: #fff;
      font-size: 9px;
      font-weight: 800;
      padding: 1px 4px;
      border-radius: 3px;
      margin-right: 2px;
    }
    .ap-ability-name { color: #C98FFF; font-weight: 700; }
    .ap-ability-desc { color: #8B6DB0; font-size: 10px; }
    .ap-ability-cd { font-size: 10px; font-weight: 700; }
    .ap-ability-cd.ready { color: #45E6B0; }
    .ap-ability-cd.cooldown { color: #FF9F43; }
    .ap-order { margin-top: 4px; font-size: 11px; }
    .ap-order-current { color: #FFD93D; font-weight: 700; }
    .ap-order-queued { color: #8B6DB0; font-size: 10px; padding-left: 8px; }
    .ap-effects { margin-top: 2px; font-size: 10px; }

    /* ─── CUSTOM SCROLLBARS ────────────────────────────── */
    #command-log::-webkit-scrollbar,
    #ability-panel::-webkit-scrollbar {
      width: 5px;
    }
    #command-log::-webkit-scrollbar-track,
    #ability-panel::-webkit-scrollbar-track {
      background: rgba(42, 24, 88, 0.4);
      border-radius: 3px;
    }
    #command-log::-webkit-scrollbar-thumb,
    #ability-panel::-webkit-scrollbar-thumb {
      background: rgba(201, 143, 255, 0.35);
      border-radius: 3px;
    }
    #command-log::-webkit-scrollbar-thumb:hover,
    #ability-panel::-webkit-scrollbar-thumb:hover {
      background: rgba(201, 143, 255, 0.55);
    }
    #command-log,
    #ability-panel {
      scrollbar-width: thin;
      scrollbar-color: rgba(201, 143, 255, 0.35) rgba(42, 24, 88, 0.4);
    }

    /* ─── PULSE ANIMATION (ability ready) ─────────────── */
    @keyframes ability-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201, 143, 255, 0); }
      50% { box-shadow: 0 0 8px 2px rgba(201, 143, 255, 0.25); }
    }

    /* ─── DAY/NIGHT CYCLE INDICATOR ────────────────────────── */
    #horde-daynight {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      margin-top: 70px; /* below the top bar */
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      background: rgba(20, 15, 40, 0.85);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(139,115,85,0.4);
      border-radius: 20px;
      z-index: 101; pointer-events: none;
      font-family: 'Nunito', sans-serif;
      transition: background 1s ease, border-color 1s ease;
    }
    #horde-daynight.night {
      background: rgba(10, 5, 30, 0.92);
      border-color: rgba(100, 80, 160, 0.6);
    }
    #horde-daynight.blood-moon {
      background: rgba(40, 5, 10, 0.92);
      border-color: rgba(200, 50, 50, 0.7);
      box-shadow: 0 0 20px rgba(200, 50, 50, 0.3);
    }
    #horde-daynight .dn-icon {
      font-size: 18px;
      transition: transform 0.5s ease;
    }
    #horde-daynight .dn-text {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      letter-spacing: 1px;
    }
    #horde-daynight .dn-timer {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
    }
    #horde-daynight .dn-bar {
      width: 60px; height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    #horde-daynight .dn-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s linear, background 1s ease;
    }

    /* ─── HORDE MODE FLOATING OVERLAY PANELS ──────────────── */

    /* Top control group bar */
    #horde-top-bar {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px; z-index: 101; pointer-events: all;
      font-family: 'Nunito', sans-serif;
    }
    #horde-top-bar .ctrl-card {
      background: rgba(212,196,160,0.88); backdrop-filter: blur(8px);
      border: 2px solid rgba(139,115,85,0.6); border-radius: 10px;
      padding: clamp(4px, 0.5vw, 6px) clamp(8px, 1vw, 12px);
      text-align: center; min-width: clamp(70px, 7vw, 90px);
      font-size: clamp(9px, 1vw, 12px);
      cursor: pointer; transition: all 0.15s ease; position: relative;
    }
    #horde-top-bar .ctrl-card:hover { border-color: #8B7355; }
    #horde-top-bar .ctrl-card.active {
      border-color: #FFD93D;
      background: linear-gradient(180deg, rgba(255,217,61,0.15) 0%, rgba(188,168,120,0.95) 100%);
      box-shadow: 0 0 8px rgba(255,217,61,0.35);
      transform: scale(1.08);
    }
    #horde-top-bar .ctrl-card.active::after {
      content: ''; position: absolute; bottom: -3px; left: 15%; right: 15%;
      height: 2px; background: #FFD93D; border-radius: 2px;
      opacity: 0.7;
    }
    #horde-top-bar .ctrl-card.active .hotkey {
      background: linear-gradient(135deg, #FFD93D, #E6A800);
    }
    #horde-top-bar .ctrl-card.just-selected {
      animation: just-selected-pop 0.25s ease-out;
    }
    @keyframes just-selected-pop {
      0% { transform: scale(1.05); }
      50% { transform: scale(1.14); }
      100% { transform: scale(1.08); }
    }
    #horde-top-bar .ctrl-card .hotkey {
      position: absolute; top: -6px; left: -6px; width: 20px; height: 20px;
      background: linear-gradient(135deg, #8B7355, #6B5335); color: #fff;
      font-size: 11px; font-weight: 800; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fredoka', sans-serif;
    }

    /* Bottom-right resource panel (left of minimap) */
    #horde-resource-panel {
      position: absolute; bottom: 8px; right: clamp(180px, 15vw, 216px);
      width: clamp(140px, 13vw, 200px);
      background: rgba(212,196,160,0.88); backdrop-filter: blur(10px);
      border: 2px solid rgba(139,115,85,0.5); border-radius: 12px;
      padding: 10px 12px; z-index: 101; pointer-events: all;
      font-family: 'Nunito', sans-serif;
      scrollbar-width: thin; scrollbar-color: rgba(139,115,85,0.5) rgba(212,196,160,0.4);
    }
    #horde-resource-panel::-webkit-scrollbar { width: 5px; }
    #horde-resource-panel::-webkit-scrollbar-track { background: rgba(139,115,85,0.15); border-radius: 3px; }
    #horde-resource-panel::-webkit-scrollbar-thumb { background: rgba(139,115,85,0.4); border-radius: 3px; }

    /* Left sidebar wrapper for cmd log + quests */
    #horde-left-sidebar {
      position: absolute; top: 8px; left: 8px;
      width: clamp(200px, 20vw, 280px);
      display: flex; flex-direction: column; gap: 8px;
      z-index: 101; pointer-events: none;
      max-height: calc(100vh - 16px);
    }

    /* Left command log panel */
    #horde-cmd-log {
      width: 100%;
      max-height: min(calc(100vh - 100px), 500px); overflow-y: auto;
      background: rgba(212,196,160,0.88); backdrop-filter: blur(10px);
      border: 2px solid rgba(139,115,85,0.5); border-radius: 12px;
      padding: 10px 12px; pointer-events: all;
      font-family: 'Nunito', sans-serif;
      scrollbar-width: thin; scrollbar-color: rgba(139,115,85,0.5) rgba(212,196,160,0.4);
    }
    #horde-cmd-log::-webkit-scrollbar { width: 5px; }
    #horde-cmd-log::-webkit-scrollbar-track { background: rgba(139,115,85,0.15); border-radius: 3px; }
    #horde-cmd-log::-webkit-scrollbar-thumb { background: rgba(139,115,85,0.4); border-radius: 3px; }

    /* Quest cards — below command log */
    #horde-quest-panel {
      width: 100%;
      max-height: min(30vh, 220px); overflow-y: auto;
      background: rgba(212,196,160,0.88); backdrop-filter: blur(10px);
      border: 2px solid rgba(139,115,85,0.5); border-radius: 12px;
      padding: 10px 12px; pointer-events: all;
      display: flex; flex-direction: column; gap: 6px;
      font-family: 'Nunito', sans-serif;
      scrollbar-width: thin; scrollbar-color: rgba(139,115,85,0.5) rgba(212,196,160,0.4);
    }
    #horde-quest-panel::-webkit-scrollbar { width: 5px; }
    #horde-quest-panel::-webkit-scrollbar-track { background: rgba(139,115,85,0.15); border-radius: 3px; }
    #horde-quest-panel::-webkit-scrollbar-thumb { background: rgba(139,115,85,0.4); border-radius: 3px; }

    /* Bottom-left event cards */
    #horde-event-panel {
      position: absolute; bottom: 8px; left: 8px;
      width: clamp(160px, 15vw, 220px);
      max-height: min(40vh, 300px); overflow-y: auto;
      z-index: 101; pointer-events: all;
      display: flex; flex-direction: column; gap: 6px;
      font-family: 'Nunito', sans-serif;
      scrollbar-width: thin; scrollbar-color: rgba(139,115,85,0.5) transparent;
    }
    #horde-event-panel::-webkit-scrollbar { width: 5px; }
    #horde-event-panel::-webkit-scrollbar-track { background: rgba(139,115,85,0.15); border-radius: 3px; }
    #horde-event-panel::-webkit-scrollbar-thumb { background: rgba(139,115,85,0.4); border-radius: 3px; }

    /* Right upgrade panel (below quests) */
    #horde-upgrade-panel {
      position: absolute; right: 8px;
      width: clamp(160px, 15vw, 220px);
      max-height: min(35vh, 280px); overflow-y: auto;
      background: rgba(212,196,160,0.88); backdrop-filter: blur(10px);
      border: 2px solid rgba(139,115,85,0.5); border-radius: 12px;
      padding: 10px 12px; z-index: 101; pointer-events: all;
      display: flex; flex-direction: column; gap: 4px;
      font-family: 'Nunito', sans-serif;
      scrollbar-width: thin; scrollbar-color: rgba(139,115,85,0.5) rgba(212,196,160,0.4);
    }
    #horde-upgrade-panel::-webkit-scrollbar { width: 5px; }
    #horde-upgrade-panel::-webkit-scrollbar-track { background: rgba(139,115,85,0.15); border-radius: 3px; }
    #horde-upgrade-panel::-webkit-scrollbar-thumb { background: rgba(139,115,85,0.4); border-radius: 3px; }

    /* Bottom-right minimap */
    #horde-minimap {
      position: absolute; bottom: 8px; right: 8px;
      width: clamp(150px, 15vw, 200px); height: clamp(150px, 15vw, 200px);
      background: rgba(0,0,0,0.6); border: 2px solid rgba(139,115,85,0.7);
      border-radius: 8px; z-index: 101; pointer-events: all;
      cursor: pointer; overflow: hidden;
    }

    /* Always-on voice pulsing */
    @keyframes voice-always-pulse {
      0%, 100% { box-shadow: 0 0 4px rgba(255,107,107,0.2); }
      50% { box-shadow: 0 0 12px rgba(255,107,107,0.5); }
    }

    /* ─── VOICE ORB ──────────────────────────────────────── */
    #voice-orb-container {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      z-index: 102; pointer-events: all;
    }
    #voice-transcript-area {
      text-align: center; max-width: 400px; min-height: 20px;
      pointer-events: none;
    }
    #voice-response-text {
      font-size: 14px; font-weight: 700; color: #f0e8d0;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      opacity: 0; transition: opacity 0.5s ease;
      line-height: 1.4; margin-bottom: 4px;
      font-family: 'Fredoka', sans-serif;
    }
    #voice-response-text.typing { opacity: 1; }
    #voice-partial-text {
      font-size: 13px; font-style: italic; color: rgba(212,196,160,0.7);
      opacity: 0; transition: opacity 0.3s ease;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    #voice-orb {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(180deg, rgba(232,220,196,0.95) 0%, rgba(188,168,120,0.95) 100%);
      border: 3px solid rgba(139,115,85,0.7);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      color: #6B5335;
      transition: all 0.3s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    #voice-orb:hover { transform: scale(1.08); }

    /* Orb states */
    #voice-orb.idle {
      animation: orb-float 3s ease-in-out infinite;
    }
    @keyframes orb-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    #voice-orb.listening {
      border-color: #45E6B0;
      background: linear-gradient(180deg, rgba(69,230,176,0.15) 0%, rgba(188,168,120,0.95) 100%);
      box-shadow: 0 0 20px rgba(69,230,176,0.6), 0 0 40px rgba(69,230,176,0.3), inset 0 0 12px rgba(69,230,176,0.15);
      animation: orb-pulse 1.5s ease-in-out infinite;
    }
    @keyframes orb-pulse {
      0%, 100% { box-shadow: 0 0 16px rgba(69,230,176,0.4), 0 0 32px rgba(69,230,176,0.15), inset 0 0 8px rgba(69,230,176,0.1); transform: scale(1); }
      50% { box-shadow: 0 0 28px rgba(69,230,176,0.7), 0 0 56px rgba(69,230,176,0.35), inset 0 0 16px rgba(69,230,176,0.2); transform: scale(1.05); }
    }
    #voice-orb.processing {
      border-color: #FFD93D;
      background: linear-gradient(180deg, rgba(255,217,61,0.15) 0%, rgba(188,168,120,0.95) 100%);
      box-shadow: 0 0 16px rgba(255,217,61,0.5);
      animation: orb-spin 1s linear infinite;
      opacity: 0.85;
    }
    @keyframes orb-spin {
      0% { box-shadow: 0 0 12px rgba(255,217,61,0.3), 4px 0 8px rgba(255,217,61,0.4); }
      25% { box-shadow: 0 0 12px rgba(255,217,61,0.3), 0 4px 8px rgba(255,217,61,0.4); }
      50% { box-shadow: 0 0 12px rgba(255,217,61,0.3), -4px 0 8px rgba(255,217,61,0.4); }
      75% { box-shadow: 0 0 12px rgba(255,217,61,0.3), 0 -4px 8px rgba(255,217,61,0.4); }
      100% { box-shadow: 0 0 12px rgba(255,217,61,0.3), 4px 0 8px rgba(255,217,61,0.4); }
    }
    #voice-orb.speaking {
      border-color: #9B7FD4;
      background: linear-gradient(180deg, rgba(155,127,212,0.25) 0%, rgba(188,168,120,0.95) 100%);
      box-shadow: 0 0 16px rgba(155,127,212,0.5), 0 0 32px rgba(155,127,212,0.2);
      animation: orb-speak 0.6s ease-in-out infinite;
    }
    @keyframes orb-speak {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.06); }
      50% { transform: scale(0.96); }
      75% { transform: scale(1.04); }
    }
    #voice-orb.error {
      border-color: #FF6B6B;
      box-shadow: 0 0 20px rgba(255,107,107,0.6);
    }
    #voice-orb.muted {
      border-color: #666;
      background: linear-gradient(180deg, rgba(100,100,100,0.95) 0%, rgba(70,70,70,0.95) 100%);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      opacity: 0.6;
    }
    #voice-orb.muted svg { opacity: 0.5; }

    /* Orb icon container */
    #voice-orb-icon { display: flex; align-items: center; justify-content: center; }

    /* Status label below orb */
    #voice-orb-status {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; text-align: center;
      font-family: 'Fredoka', sans-serif;
      min-height: 14px; line-height: 14px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      transition: color 0.3s ease, opacity 0.3s ease;
    }
    .voice-status-idle { color: rgba(212,196,160,0.4); }
    .voice-status-listening { color: #45E6B0; animation: status-blink 2s ease-in-out infinite; }
    .voice-status-processing { color: #FFD93D; }
    .voice-status-speaking { color: #9B7FD4; }
    .voice-status-error { color: #FF6B6B; }
    .voice-status-muted { color: #888; }
    @keyframes status-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Avatar badge on orb */
    #voice-orb-avatar {
      position: absolute; top: -10px; right: -10px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(212,196,160,0.95);
      border: 2px solid rgba(139,115,85,0.7);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Text input beside orb */
    #voice-text-input {
      padding: 10px 16px; font-size: 14px;
      background: linear-gradient(180deg, rgba(232,220,196,0.95) 0%, rgba(212,196,160,0.95) 100%);
      color: #2a1a0a;
      border: 2px solid rgba(139,115,85,0.7); border-radius: 10px; outline: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
      font-family: 'Fredoka', sans-serif; font-weight: 600;
      width: min(400px, 80vw);
      transition: border-color 0.2s ease;
    }
    #voice-text-input:focus { border-color: #8B7355; }

    /* ─── TALKING PORTRAIT ────────────────────────────── */
    #talking-portrait {
      position: absolute;
      right: 8px;
      top: 8px;
      width: 250px;
      height: 250px;
      overflow: hidden;
      z-index: 102;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    #talking-portrait.visible { opacity: 1; }
    #talking-portrait .portrait-frame {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      image-rendering: pixelated; object-fit: contain;
    }
    #talking-portrait .portrait-idle { opacity: 1; }
    #talking-portrait .portrait-talk { opacity: 0; }
    #talking-portrait.speaking .portrait-idle { opacity: 0; }
    #talking-portrait.speaking .portrait-talk { opacity: 1; }

    /* Speech bubble */
    #talking-portrait .portrait-bubble {
      position: absolute;
      right: 110%;
      top: 8px;
      width: 220px;
      padding: 8px 10px;
      background: #1a1a2e;
      border: 2px solid #8B7355;
      border-radius: 8px;
      color: #e8d5b0;
      font-size: 13px;
      line-height: 1.3;
      font-family: 'Press Start 2P', monospace;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    #talking-portrait .portrait-bubble.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud-overlay">
      <div id="status-bar"></div>
      <div id="ability-panel"></div>
      <div id="command-log"></div>
    </div>
    <div id="hero-bar">
      <div class="hero-row" id="hero-row"></div>
      <div class="ability-bar" id="ability-bar"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
