<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Battle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    #hud-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #command-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 12px 16px;
      background: rgba(10, 10, 26, 0.92);
      border-top: 1px solid #333;
      display: none;
      pointer-events: all;
      z-index: 20;
    }
    #command-bar .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #command-input {
      flex: 1;
      padding: 10px 14px;
      font-size: 16px;
      background: #1a1a2e;
      border: 1px solid #444;
      border-radius: 6px;
      color: #fff;
      outline: none;
    }
    #command-input:focus { border-color: #6c63ff; }
    #voice-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #555;
      background: #1a1a2e;
      color: #ccc;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #voice-btn.listening {
      border-color: #ff4444;
      background: #2a1a1a;
      color: #ff4444;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    #send-btn {
      padding: 10px 20px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
    }
    #send-btn:hover { background: #5a52d5; }
    #command-log {
      position: absolute;
      bottom: 70px;
      left: 16px;
      width: 350px;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(10, 10, 26, 0.85);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      pointer-events: all;
      display: none;
      z-index: 20;
    }
    #command-log .log-entry {
      margin-bottom: 6px;
      padding: 4px 0;
      border-bottom: 1px solid #222;
    }
    #command-log .log-entry .player { color: #6c63ff; font-weight: 600; }
    #command-log .log-entry .text { color: #aaa; }
    #command-log .log-entry .result { color: #4caf50; font-size: 12px; }
    #status-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 8px 16px;
      background: rgba(10, 10, 26, 0.85);
      display: none;
      pointer-events: all;
      z-index: 20;
      font-size: 14px;
    }
    #status-bar .char-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 16px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
    }
    #status-bar .char-status .hp-bar {
      width: 60px;
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
    }
    #status-bar .char-status .hp-fill {
      height: 100%;
      background: #4caf50;
      transition: width 0.3s;
    }
    .processing-indicator {
      color: #ffaa00;
      font-style: italic;
      padding: 4px 0;
    }
    /* ─── Ability & Queue Panel ──────────────────────────── */
    #ability-panel {
      position: absolute;
      top: 80px;
      right: 8px;
      width: 220px;
      background: rgba(8, 8, 20, 0.92);
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px;
      pointer-events: all;
      display: none;
      z-index: 20;
      font-family: 'Rajdhani', monospace;
      max-height: calc(100vh - 180px);
      overflow-y: auto;
    }
    #ability-panel h3 {
      font-size: 11px;
      color: #6c63ff;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0 0 8px 0;
      border-bottom: 1px solid #2a2a4a;
      padding-bottom: 4px;
    }
    .ap-char {
      margin-bottom: 10px;
      padding: 6px 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      border-left: 3px solid #6c63ff;
    }
    .ap-char.enemy { border-left-color: #ff4444; }
    .ap-char-name {
      font-size: 13px;
      font-weight: 700;
      color: #ddd;
    }
    .ap-char-class {
      font-size: 11px;
      color: #888;
    }
    .ap-ability {
      margin-top: 4px;
      padding: 4px 6px;
      background: rgba(108, 99, 255, 0.1);
      border-radius: 4px;
      font-size: 11px;
    }
    .ap-ability-name {
      color: #bb88ff;
      font-weight: 700;
    }
    .ap-ability-desc {
      color: #999;
      font-size: 10px;
    }
    .ap-ability-cd {
      font-size: 10px;
      font-weight: 700;
    }
    .ap-ability-cd.ready { color: #44ff88; }
    .ap-ability-cd.cooldown { color: #ff8844; }
    .ap-order {
      margin-top: 4px;
      font-size: 11px;
    }
    .ap-order-current {
      color: #ffcc00;
      font-weight: 700;
    }
    .ap-order-queued {
      color: #888;
      font-size: 10px;
      padding-left: 8px;
    }
    .ap-effects {
      margin-top: 2px;
      font-size: 10px;
    }
    /* ─── Better text colors ──────────────────────────────── */
    #status-bar {
      font-size: 13px;
    }
    #status-bar .char-status {
      display: inline-flex;
      flex-direction: column;
      gap: 2px;
      margin-right: 12px;
      padding: 5px 8px;
      border-radius: 5px;
      background: rgba(255,255,255,0.06);
      min-width: 120px;
    }
    #status-bar .char-status .hp-bar {
      width: 80px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
    }
    #status-bar .char-status .hp-fill {
      height: 100%;
      background: #4caf50;
      transition: width 0.3s;
    }
    #command-log .log-entry .player { color: #88aaff; font-weight: 700; }
    #command-log .log-entry .text { color: #ccc; }
    #command-log .log-entry .result { color: #66dd88; font-size: 12px; }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud-overlay">
      <div id="status-bar"></div>
      <div id="ability-panel"></div>
      <div id="command-log"></div>
    </div>
    <div id="command-bar">
      <div class="input-row">
        <input id="command-input" type="text" placeholder="Type a command... (e.g., 'Send my warrior to attack the enemy mage')" autocomplete="off" />
        <button id="voice-btn" title="Hold to speak">&#127908;</button>
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
